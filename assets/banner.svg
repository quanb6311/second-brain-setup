<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#0E1630"/>
      <stop offset="1" stop-color="#0B1226"/>
    </linearGradient>
    <linearGradient id="accent" x1="440" y1="150" x2="850" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="1" stop-color="#39E6C3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F8CFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#4F8CFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#39E6C3" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#39E6C3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="338" rx="15" stroke="#233055" stroke-width="2"/>

  <!-- ambient orbs -->
  <circle cx="1080" cy="60" r="220" fill="url(#orb)"/>
  <circle cx="160" cy="300" r="200" fill="url(#orb)"/>

  <!-- constellation brain, left -->
  <g stroke="#3A4C7F" stroke-width="1.6">
    <line x1="150" y1="120" x2="215" y2="88"/>
    <line x1="215" y1="88" x2="285" y2="112"/>
    <line x1="285" y1="112" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="252" y2="232"/>
    <line x1="252" y1="232" x2="178" y2="222"/>
    <line x1="178" y1="222" x2="150" y2="120"/>
    <line x1="215" y1="88" x2="232" y2="160"/>
    <line x1="150" y1="120" x2="232" y2="160"/>
    <line x1="232" y1="160" x2="300" y2="180"/>
    <line x1="232" y1="160" x2="252" y2="232"/>
    <line x1="285" y1="112" x2="232" y2="160"/>
    <line x1="178" y1="222" x2="232" y2="160"/>
  </g>
  <g fill="#4F8CFF">
    <circle cx="150" cy="120" r="7"/>
    <circle cx="215" cy="88" r="5"/>
    <circle cx="285" cy="112" r="6"/>
    <circle cx="300" cy="180" r="5"/>
    <circle cx="252" cy="232" r="7"/>
    <circle cx="178" cy="222" r="5"/>
  </g>
  <circle cx="232" cy="160" r="10" fill="#39E6C3"/>
  <circle cx="232" cy="160" r="16" stroke="#39E6C3" stroke-opacity="0.35" stroke-width="2" fill="none"/>

  <!-- wordmark -->
  <text x="400" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#F2F6FF" letter-spacing="0.5">Second Brain Setup</text>
  <rect x="403" y="172" width="440" height="6" rx="3" fill="url(#accent)"/>

  <text x="400" y="222" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" fill="#9FB3DC">One file. One conversation. An AI memory that lasts.</text>

  <!-- chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="400" y="252" width="152" height="36" rx="18" fill="#14203E" stroke="#2C3B66"/>
    <text x="424" y="276" fill="#8FD8FF">Claude Code</text>
    <rect x="568" y="252" width="126" height="36" rx="18" fill="#14203E" stroke="#2C3B66"/>
    <text x="592" y="276" fill="#7BEAC9">Codex CLI</text>
    <rect x="710" y="252" width="150" height="36" rx="18" fill="#14203E" stroke="#2C3B66"/>
    <text x="734" y="276" fill="#C9D6F5">any AI agent</text>
  </g>

  <!-- author tag -->
  <text x="1116" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#5E729F">by Alxve</text>
</svg>
